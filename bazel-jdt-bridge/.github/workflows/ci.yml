name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bazel-jdt-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace

  ts-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bazel-jdt-bridge/vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build extension
        run: npm run build

  java-checks:
    runs-on: ubuntu-latest
    needs: rust-checks
    defaults:
      run:
        working-directory: bazel-jdt-bridge/java-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build native library
        run: |
          cd ..
          cargo build -p bazel-jdt-core --release
      - name: Maven compile
        run: mvn compile
      - name: Maven test
        run: mvn test -Djava.library.path=../target/release
