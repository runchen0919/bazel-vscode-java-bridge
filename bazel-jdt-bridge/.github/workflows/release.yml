name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bazel-jdt-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install zig
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: pip3 install ziglang
      - name: Install cargo-zigbuild
        if: runner.os != 'Windows'
        run: cargo install cargo-zigbuild
      - name: Build native library
        run: |
          if command -v cargo-zigbuild &>/dev/null; then
            cargo zigbuild --target ${{ matrix.target }} --release -p bazel-jdt-core
          else
            cargo build --target ${{ matrix.target }} --release -p bazel-jdt-core
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: bazel-jdt-bridge/target/${{ matrix.target }}/release/*bazel_jdt_core*

  package:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Place native libraries into Maven resources
        run: |
          mkdir -p bazel-jdt-bridge/java-bridge/src/main/resources/native/linux-x86_64
          mkdir -p bazel-jdt-bridge/java-bridge/src/main/resources/native/linux-aarch64
          mkdir -p bazel-jdt-bridge/java-bridge/src/main/resources/native/darwin-x86_64
          mkdir -p bazel-jdt-bridge/java-bridge/src/main/resources/native/darwin-aarch64
          mkdir -p bazel-jdt-bridge/java-bridge/src/main/resources/native/windows-x86_64
          cp artifacts/native-x86_64-unknown-linux-gnu/* bazel-jdt-bridge/java-bridge/src/main/resources/native/linux-x86_64/ || true
          cp artifacts/native-aarch64-unknown-linux-gnu/* bazel-jdt-bridge/java-bridge/src/main/resources/native/linux-aarch64/ || true
          cp artifacts/native-x86_64-apple-darwin/* bazel-jdt-bridge/java-bridge/src/main/resources/native/darwin-x86_64/ || true
          cp artifacts/native-aarch64-apple-darwin/* bazel-jdt-bridge/java-bridge/src/main/resources/native/darwin-aarch64/ || true
          cp artifacts/native-x86_64-pc-windows-gnu/* bazel-jdt-bridge/java-bridge/src/main/resources/native/windows-x86_64/ || true
      - name: Assemble JAR and VSIX
        run: bash bazel-jdt-bridge/scripts/package-extension.sh
      - uses: actions/upload-artifact@v4
        with:
          name: bazel-jdt-bridge-vsce
          path: build/*.vsix
